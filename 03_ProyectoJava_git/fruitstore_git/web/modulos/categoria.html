<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FruitStore - Categorías</title>
        <link rel="stylesheet" href="../style/bootstrap/bootstrap/css/bootstrap.min.css">
    </head>
    <body>
        <main class="container mt-4">
            <div class="card shadow mb-4">
                <div class="card-header bg-success text-white">
                    <h4>Gestión de Categorías</h4>
                </div>
                <div class="card-body">
                    <form id="formCategoria">
                        <input type="hidden" id="txtIdCategoria" value="0">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="txtNombreCategoria" class="form-control">
                            </div>
                        </div>
                        <div class="mt-3">
                            <button type="button" class="btn btn-success" onclick="guardarCategoria()">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="limpiarCategoria()">Limpiar</button>
                            <button type="button" class="btn btn-danger" onclick="eliminarCategoria()">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyCategorias"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <script src="../style/bootstrap/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../style/bootstrap/sweetalert2/sweetalert2.all.min.js"></script>
        <script src="../js/categoria.js"></script>
    </body>
</html>
