<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FruitStore - Ventas</title>
        <link rel="stylesheet" href="../style/bootstrap/bootstrap/css/bootstrap.min.css">
    </head>
    <body>
        <main class="container mt-4">
            <div class="card shadow mb-4">
                <div class="card-header bg-success text-white">
                    <h4>Registro de Ventas</h4>
                </div>
                <div class="card-body">
                    <form id="formVenta">
                        <input type="hidden" id="txtIdVenta" value="0">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Vendedor</label>
                                <select id="selectVendedor" class="form-select"></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha</label>
                                <input type="datetime-local" id="txtFechaVenta" class="form-control">
                            </div>
                        </div>

                        <!--
                        <hr>
                        <h5>Productos vendidos</h5>
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Precio Venta</th>
                                    <th>Descuento</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tbodyProductos"></tbody>
                        </table>
                        -->

                        <div class="mt-3">
                            <button type="button" class="btn btn-success" onclick="guardarVenta()">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="agregarProducto()">Agregar</button>
                            <button type="button" class="btn btn-danger" onclick="eliminarVenta()">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <h5>Historial de Ventas</h5>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>Vendedor</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyVentas"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <script src="../style/bootstrap/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../style/bootstrap/sweetalert2/sweetalert2.all.min.js"></script>
        <script src="../js/venta.js"></script>
    </body>
</html>
