<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FruitStore - Productos</title>
        <link rel="stylesheet" href="../style/bootstrap/bootstrap/css/bootstrap.min.css">
    </head>
    <body>
        <main class="container mt-4">
            <div class="card shadow mb-4">
                <div class="card-header bg-success text-white">
                    <h4>Gestión de Productos</h4>
                </div>
                <div class="card-body">
                    <form id="formProducto">
                        <input type="hidden" id="txtIdProducto" value="0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="txtNombreProducto" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Categoría</label>
                                <select id="cmbCategoria" class="form-select"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Precio Compra</label>
                                <input type="number" id="txtPrecioCompra" min="0.01" step="0.01" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Precio Venta</label>
                                <input type="number" id="txtPrecioVenta" min="0.01" step="0.01" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Existencia</label>
                                <input type="number" id="txtExistencia" min="0" step="1" class="form-control">
                            </div>
                        </div>
                        <div class="mt-3">
                            <button type="button" class="btn btn-success" onclick="guardarProducto()">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="limpiarProducto()">Limpiar</button>
                            <button type="button" class="btn btn-danger" onclick="eliminarProducto()">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio Compra</th>
                                <th>Precio Venta</th>
                                <th>Existencia</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyProductos"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <script src="../style/bootstrap/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../style/bootstrap/sweetalert2/sweetalert2.all.min.js"></script>
        <script src="../js/producto.js"></script>
    </body>
</html>
