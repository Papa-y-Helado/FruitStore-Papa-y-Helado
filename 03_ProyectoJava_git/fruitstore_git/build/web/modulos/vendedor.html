<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FruitStore - Vendedores</title>
        <link rel="stylesheet" href="../style/bootstrap/bootstrap/css/bootstrap.min.css">
    </head>
    <body>
        <main class="container mt-4">
            <div class="card shadow mb-4">
                <div class="card-header bg-success text-white">
                    <h4>Gestión de Vendedores</h4>
                </div>
                <div class="card-body">
                    <form id="formVendedor">
                        <input type="hidden" id="txtIdVendedor" value="0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="txtNombreVendedor" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" id="txtEmailVendedor" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Teléfono</label>
                                <input type="text" id="txtTelefonoVendedor" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Fecha Nacimiento</label>
                                <input type="date" id="txtFechaNacimiento" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Fecha Ingreso</label>
                                <input type="date" id="txtFechaIngreso" class="form-control">
                            </div>
                        </div>
                        <div class="mt-3">
                            <button type="button" class="btn btn-success" onclick="guardarVendedor()">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="limpiarVendedor()">Limpiar</button>
                            <button type="button" class="btn btn-danger" onclick="eliminarVendedor()">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Teléfono</th>
                                <th>Fecha de Nacimiento</th>
                                <th>Fecha de Ingreso</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyVendedores"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <script src="../style/bootstrap/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../style/bootstrap/sweetalert2/sweetalert2.all.min.js"></script>
        <script src="../js/vendedor.js"></script>
    </body>
</html>
