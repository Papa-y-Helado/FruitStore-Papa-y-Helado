<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FruitStore - Proveedores</title>
        <link rel="stylesheet" href="../style/bootstrap/bootstrap/css/bootstrap.min.css">
    </head>
    <body>
        <main class="container mt-4">
            <div class="card shadow mb-4">
                <div class="card-header bg-success text-white">
                    <h4>Gestión de Proveedores</h4>
                </div>
                <div class="card-body">
                    <form id="formProveedor">
                        <input type="hidden" id="txtIdProveedor" value="0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="txtNombreProveedor" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Razón Social</label>
                                <input type="text" id="txtRazonSocial" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">RFC</label>
                                <input type="text" id="txtRfc" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Dirección</label>
                                <input type="text" id="txtDirección" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" id="txtEmailProveedor" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Teléfono fijo</label>
                                <input type="tel" id="txtTelefonoFijo" class="form-control"
                                       maxlength="10">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Teléfono móvil</label>
                                <input type="tel" id="txtTelefonoMovil" class="form-control"
                                       maxlength="10">
                            </div>



                        </div>
                        <div class="mt-3">
                            <button type="button" class="btn btn-success" onclick="guardarProveedor()">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="agregarProveedor()">Agregar</button>
                            <button type="button" class="btn btn-danger" onclick="eliminarProveedor()">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Teléfono</th>
                                <th>Ciudad</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyProveedores"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <script src="../style/bootstrap/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../style/bootstrap/sweetalert2/sweetalert2.all.min.js"></script>
        <script src="../js/proveedor.js"></script>
    </body>
</html>
